<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUMVIA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8e44ad">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
:root { --accent:#8e44ad; }

body {
  margin:0;
  padding:12px;
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background: linear-gradient(-45deg,#8e44ad,#6f2d91,#3b0a57,#000);
  background-size:400% 400%;
  animation:gradientBG 10s ease infinite;
  color:#fff;
}

@keyframes gradientBG {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.card {
  backdrop-filter:blur(18px);
  background:rgba(255,255,255,0.08);
  border-radius:24px;
  padding:1.5rem 1.2rem;
  width:calc(100% - 24px);
  max-width:420px;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

header {
  font-size:1.7rem;
  text-align:center;
  margin-bottom:1rem;
}

.form-group {
  width:100%;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input, select, button {
  width:100%;
  height:48px;
  padding:0 14px;
  border-radius:12px;
  border:none;
  outline:none;
  box-sizing:border-box;
}

input, select {
  background:rgba(255,255,255,0.15);
  color:#fff;
}

button {
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:active { transform:scale(0.97); }

button:nth-of-type(1) {
  background:linear-gradient(135deg,#f1c40f,#ff9f1c);
}

button:nth-of-type(2) {
  background:rgba(255,255,255,0.25);
  color:#fff;
}

#installBtn {
  display:none;
  background:#fff;
  color:#000;
}

.result-box {
  margin-top:12px;
  padding:1rem;
  border-radius:14px;
  background:rgba(255,255,255,0.12);
}

footer {
  margin-top:1rem;
  font-size:0.8rem;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">
<header>NUMVIA</header>

<div class="form-group">
  <input type="text" id="name" placeholder="Enter name or numbers">
  <input type="date" id="dob">

  <select id="system">
    <option value="chaldean">Chaldean</option>
    <option value="pythagoras">Pythagoras</option>
    <option value="vedic">Vedic</option>
    <option value="kabalah">Kabalah</option>
  </select>

  <button onclick="calculate()">Calculate</button>
  <button onclick="resetForm()">Reset</button>
  <button id="installBtn">Install App</button>
</div>

<div id="result"></div>
</div>

<footer>© Manik Roy <span id="year"></span>. All Rights Reserved.</footer>

<script>
// Auto year
document.getElementById("year").textContent=new Date().getFullYear();

/* Maps */
const maps = {
chaldean:{A:1,B:2,C:3,D:4,E:5,F:8,G:3,H:5,I:1,J:1,K:2,L:3,M:4,N:5,O:7,P:8,Q:1,R:2,S:3,T:4,U:6,V:6,W:6,X:5,Y:1,Z:7},
pythagoras:{A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,I:9,J:1,K:2,L:3,M:4,N:5,O:6,P:7,Q:8,R:9,S:1,T:2,U:3,V:4,W:5,X:6,Y:7,Z:8},
vedic:{A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,I:9,J:1,K:2,L:3,M:4,N:5,O:7,P:8,Q:9,R:1,S:2,T:3,U:4,V:5,W:6,X:7,Y:8,Z:9},
kabalah:{A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,I:9,J:10,K:11,L:12,M:13,N:14,O:15,P:16,Q:17,R:18,S:19,T:20,U:21,V:22,W:23,X:24,Y:25,Z:26}
};

/* Meanings 1–99 */
const meanings = {
1:"Leadership, independence",2:"Balance, cooperation",3:"Creativity",4:"Stability",
5:"Freedom",6:"Responsibility",7:"Spirituality",8:"Power",9:"Compassion",
10:"New beginnings",11:"Master intuition",12:"Learning",13:"Transformation",
14:"Change",15:"Love",16:"Karma",17:"Success",18:"Humanitarian",19:"Independence",
20:"Diplomacy",21:"Creative success",22:"Master builder",23:"Freedom",
24:"Family",25:"Wisdom",26:"Material success",27:"Spiritual insight",
28:"Leadership",29:"Sensitivity",30:"Expression",31:"Practicality",
32:"Communication",33:"Master teacher",34:"Growth",35:"Adventure",
36:"Responsibility",37:"Spiritual awareness",38:"Power",39:"Compassion",
40:"Discipline",41:"Independence",42:"Harmony",43:"Growth",
44:"Master builder",45:"Freedom",46:"Responsibility",47:"Inner wisdom",
48:"Success",49:"Service",50:"Freedom",51:"Leadership",
52:"Balance",53:"Change",54:"Structure",55:"Transformation",
56:"Service",57:"Spiritual growth",58:"Power",59:"Compassion",
60:"Family",61:"Growth",62:"Harmony",63:"Care",
64:"Stability",65:"Freedom",66:"Master love",67:"Spiritual depth",
68:"Achievement",69:"Service",70:"Awakening",71:"Insight",
72:"Harmony",73:"Creativity",74:"Foundation",75:"Wisdom",
76:"Responsibility",77:"Master intuition",78:"Achievement",79:"Service",
80:"Authority",81:"Leadership",82:"Partnership",83:"Creativity",
84:"Success",85:"Freedom",86:"Family",87:"Insight",
88:"Abundance",89:"Humanitarian",90:"Completion",91:"Leadership",
92:"Service",93:"Compassion",94:"Stability",95:"Freedom",
96:"Care",97:"Wisdom",98:"Power",99:"Universal compassion"
};

function reduce(n){
while(n>9 && ![11,22,33].includes(n)){
n=n.toString().split('').reduce((a,b)=>a+Number(b),0);
}
return n;
}

function toTwoDigit(n){
while(n>99){
n=n.toString().split('').reduce((a,b)=>a+Number(b),0);
}
return n;
}

function calculate(){
try{
const name=document.getElementById("name").value.trim().toUpperCase();
const dob=document.getElementById("dob").value;
const map=maps[document.getElementById("system").value];
const result=document.getElementById("result");

if(!name && !dob){
result.innerHTML="<div class='result-box'>Enter name or DOB</div>";
return;
}

let html="";

if(name){
let raw=/^[0-9]+$/.test(name)?parseInt(name):
name.replace(/[^A-Z]/g,'').split('').reduce((s,l)=>s+(map[l]||0),0);

let compound=toTwoDigit(raw);
let single=reduce(compound);

html+=`<div class="result-box">
<b>Compound:</b> ${compound}<br>${meanings[compound]||""}<br><br>
<b>Single:</b> ${single}<br>${meanings[single]||""}
</div>`;
}

if(dob){
let total=dob.replace(/-/g,'').split('').reduce((a,b)=>a+Number(b),0);
let d=reduce(total);

html+=`<div class="result-box">
<b>DOB Number:</b> ${d}<br>${meanings[d]||""}
</div>`;
}

result.innerHTML=html;

}catch(e){
document.getElementById("result").innerHTML="<div class='result-box'>Error</div>";
}
}

function resetForm(){
document.getElementById("name").value="";
document.getElementById("dob").value="";
document.getElementById("system").selectedIndex=0;
document.getElementById("result").innerHTML="";
}

/* Install */
let deferredPrompt;
const installBtn=document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
installBtn.style.display="block";
});

installBtn.onclick=async()=>{
if(!deferredPrompt) return;
deferredPrompt.prompt();
await deferredPrompt.userChoice;
installBtn.style.display="none";
};

/* Service Worker */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
